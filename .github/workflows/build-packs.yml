name: build-packs

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate pack metadata
        run: scripts/validate.sh

      - name: Build source-common overlay
        run: scripts/build-pack.sh source-common

      - name: Build source-anticheat-lilac overlay
        run: scripts/build-pack.sh source-anticheat-lilac

      - name: Build source-admin-sourcebans overlay
        run: scripts/build-pack.sh source-admin-sourcebans

      - name: Build l4d-common overlay
        run: scripts/build-pack.sh l4d-common

      - name: Build l4d2 overlay
        run: scripts/build-pack.sh l4d2

      - name: Build l4d-play overlay
        run: scripts/build-pack.sh l4d-play

      - name: Upload overlays
        uses: actions/upload-artifact@v4
        with:
          name: plugin-pack-overlays
          path: dist/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and publish pack image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
